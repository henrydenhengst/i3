---
- name: DevOps & SysAdmin CLI Tools Installer
  hosts: localhost
  connection: local
  become: true
  vars:
    # === CONFIGUREER HIER ===
    install_kubectl: true
    install_helm: true
    install_terraform: true
    install_ansible: true
    install_packer: true
    install_vault: true
    install_consul: true
    install_nomad: true
    install_aws_cli: true
    install_azure_cli: true
    install_gcloud_cli: true
    install_k9s: true
    install_lazygit: true
    install_jq: true
    install_yq: true
    install_fzf: true
    install_ripgrep: true
    install_fd: true
    install_bat: true
    install_httpie: true
    install_tldr: true
    install_htop: true
    install_ncdu: true
    install_iptraf: true
    install_mtr: true
    install_tcpdump: true
    install_nmap: true
    install_netcat: true
    install_strace: true
    install_ltrace: true
    install_lsof: true
    install_sysstat: true
    install_iftop: true
    install_iostat: true
    install_vmstat: true
    
    # Versies (voor handmatige installaties)
    terraform_version: "1.5.7"
    packer_version: "1.9.4"
    vault_version: "1.14.0"
    consul_version: "1.17.0"
    nomad_version: "1.6.3"
    helm_version: "3.13.0"
    kubectl_version: "1.28.2"
    k9s_version: "0.31.7"
    lazygit_version: "0.40.2"
    
    # Directories
    local_bin: "/usr/local/bin"
    temp_dir: "/tmp/devops-tools"

  tasks:
    - name: Detect OS
      set_fact:
        is_debian: "{{ ansible_os_family == 'Debian' }}"
        is_redhat: "{{ ansible_os_family == 'RedHat' }}"
        is_arch: "{{ ansible_distribution == 'Archlinux' }}"
        is_alpine: "{{ ansible_os_family == 'Alpine' }}"
        is_macos: "{{ ansible_os_family == 'Darwin' }}"

    - name: Create temp directory
      file:
        path: "{{ temp_dir }}"
        state: directory
        mode: "0755"

    # ============================================
    # 1. BASIS PAKKETTEN (via package manager)
    # ============================================
    - name: Update package cache
      package:
        update_cache: yes
      when: not is_arch

    - name: Install base CLI tools (Debian/Ubuntu)
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - wget
        - git
        - unzip
        - tar
        - gzip
        - make
        - gcc
        - python3
        - python3-pip
        - openssh-client
        - ca-certificates
        - gnupg
        - lsb-release
        - software-properties-common
      when: is_debian

    - name: Install base CLI tools (RedHat/Fedora)
      dnf:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - wget
        - git
        - unzip
        - tar
        - gzip
        - make
        - gcc
        - python3
        - python3-pip
        - openssh-clients
        - ca-certificates
        - gnupg2
        - redhat-lsb-core
      when: is_redhat

    - name: Install base CLI tools (Arch)
      pacman:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - wget
        - git
        - unzip
        - tar
        - gzip
        - make
        - gcc
        - python
        - python-pip
        - openssh
        - ca-certificates
        - gnupg
      when: is_arch

    - name: Install base CLI tools (Alpine)
      apk:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - wget
        - git
        - unzip
        - tar
        - gzip
        - make
        - gcc
        - python3
        - py3-pip
        - openssh-client
        - ca-certificates
        - gnupg
      when: is_alpine

    # ============================================
    # 2. ESSENTIAL CLI UTILITIES
    # ============================================
    - name: Install essential CLI tools via package manager
      package:
        name: "{{ item }}"
        state: present
      loop:
        - jq
        - htop
        - ncdu
        - iptraf-ng
        - mtr
        - tcpdump
        - nmap
        - strace
        - ltrace
        - lsof
        - sysstat
        - iftop
      when: not is_alpine

    - name: Install Alpine alternatives
      apk:
        name: "{{ item }}"
        state: present
      loop:
        - jq
        - htop
        - ncdu
        - iptraf-ng
        - mtr
        - tcpdump
        - nmap
        - strace
        - ltrace
        - lsof
        - sysstat
        - iftop
      when: is_alpine

    # ============================================
    # 3. MODERN CLI TOOLS (fzf, ripgrep, fd, bat)
    # ============================================
    - name: Install fzf
      block:
        - name: Clone fzf repository
          git:
            repo: https://github.com/junegunn/fzf.git
            dest: "{{ temp_dir }}/fzf"
            version: master
          become: false
          
        - name: Install fzf
          shell: |
            cd {{ temp_dir }}/fzf
            ./install --bin
            cp fzf {{ local_bin }}/
          become: false
      when: install_fzf

    - name: Install ripgrep
      block:
        - name: Download ripgrep (Linux)
          get_url:
            url: "https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-x86_64-unknown-linux-musl.tar.gz"
            dest: "{{ temp_dir }}/ripgrep.tar.gz"
          when: not is_macos
          
        - name: Extract ripgrep
          unarchive:
            src: "{{ temp_dir }}/ripgrep.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
          when: not is_macos
          
        - name: Install ripgrep binary
          copy:
            src: "{{ temp_dir }}/ripgrep-14.1.0-x86_64-unknown-linux-musl/rg"
            dest: "{{ local_bin }}/rg"
            mode: "0755"
            remote_src: yes
      when: install_ripgrep

    - name: Install fd
      block:
        - name: Download fd (Linux)
          get_url:
            url: "https://github.com/sharkdp/fd/releases/download/v8.7.0/fd-v8.7.0-x86_64-unknown-linux-musl.tar.gz"
            dest: "{{ temp_dir }}/fd.tar.gz"
          when: not is_macos
          
        - name: Extract fd
          unarchive:
            src: "{{ temp_dir }}/fd.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
          when: not is_macos
          
        - name: Install fd binary
          copy:
            src: "{{ temp_dir }}/fd-v8.7.0-x86_64-unknown-linux-musl/fd"
            dest: "{{ local_bin }}/fd"
            mode: "0755"
            remote_src: yes
      when: install_fd

    - name: Install bat
      block:
        - name: Download bat (Linux)
          get_url:
            url: "https://github.com/sharkdp/bat/releases/download/v0.24.0/bat-v0.24.0-x86_64-unknown-linux-musl.tar.gz"
            dest: "{{ temp_dir }}/bat.tar.gz"
          when: not is_macos
          
        - name: Extract bat
          unarchive:
            src: "{{ temp_dir }}/bat.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
          when: not is_macos
          
        - name: Install bat binary
          copy:
            src: "{{ temp_dir }}/bat-v0.24.0-x86_64-unknown-linux-musl/bat"
            dest: "{{ local_bin }}/bat"
            mode: "0755"
            remote_src: yes
      when: install_bat

    - name: Install httpie
      pip:
        name: httpie
        state: present
      when: install_httpie

    - name: Install tldr
      npm:
        name: tldr
        global: yes
        state: present
      when: install_tldr
      ignore_errors: yes

    - name: Install yq
      block:
        - name: Download yq
          get_url:
            url: "https://github.com/mikefarah/yq/releases/download/v4.35.2/yq_linux_amd64"
            dest: "{{ local_bin }}/yq"
            mode: "0755"
      when: install_yq

    - name: Install lazygit
      block:
        - name: Download lazygit
          get_url:
            url: "https://github.com/jesseduffield/lazygit/releases/download/v{{ lazygit_version }}/lazygit_{{ lazygit_version }}_Linux_x86_64.tar.gz"
            dest: "{{ temp_dir }}/lazygit.tar.gz"
          when: not is_macos
          
        - name: Extract lazygit
          unarchive:
            src: "{{ temp_dir }}/lazygit.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
          when: not is_macos
          
        - name: Install lazygit
          copy:
            src: "{{ temp_dir }}/lazygit"
            dest: "{{ local_bin }}/lazygit"
            mode: "0755"
            remote_src: yes
      when: install_lazygit

    # ============================================
    # 4. KUBERNETES TOOLS
    # ============================================
    - name: Install kubectl
      block:
        - name: Download kubectl
          get_url:
            url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
            dest: "{{ local_bin }}/kubectl"
            mode: "0755"
      when: install_kubectl

    - name: Install helm
      block:
        - name: Download helm
          get_url:
            url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
            dest: "{{ temp_dir }}/helm.tar.gz"
            
        - name: Extract helm
          unarchive:
            src: "{{ temp_dir }}/helm.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
            
        - name: Install helm
          copy:
            src: "{{ temp_dir }}/linux-amd64/helm"
            dest: "{{ local_bin }}/helm"
            mode: "0755"
            remote_src: yes
      when: install_helm

    - name: Install k9s
      block:
        - name: Download k9s
          get_url:
            url: "https://github.com/derailed/k9s/releases/download/v{{ k9s_version }}/k9s_Linux_amd64.tar.gz"
            dest: "{{ temp_dir }}/k9s.tar.gz"
            
        - name: Extract k9s
          unarchive:
            src: "{{ temp_dir }}/k9s.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
            
        - name: Install k9s
          copy:
            src: "{{ temp_dir }}/k9s"
            dest: "{{ local_bin }}/k9s"
            mode: "0755"
            remote_src: yes
      when: install_k9s

    # ============================================
    # 5. HASHICORP TOOLS
    # ============================================
    - name: Install terraform
      block:
        - name: Download terraform
          get_url:
            url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
            dest: "{{ temp_dir }}/terraform.zip"
            
        - name: Extract terraform
          unarchive:
            src: "{{ temp_dir }}/terraform.zip"
            dest: "{{ local_bin }}"
            remote_src: yes
            mode: "0755"
      when: install_terraform

    - name: Install packer
      block:
        - name: Download packer
          get_url:
            url: "https://releases.hashicorp.com/packer/{{ packer_version }}/packer_{{ packer_version }}_linux_amd64.zip"
            dest: "{{ temp_dir }}/packer.zip"
            
        - name: Extract packer
          unarchive:
            src: "{{ temp_dir }}/packer.zip"
            dest: "{{ local_bin }}"
            remote_src: yes
            mode: "0755"
      when: install_packer

    - name: Install vault
      block:
        - name: Download vault
          get_url:
            url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
            dest: "{{ temp_dir }}/vault.zip"
            
        - name: Extract vault
          unarchive:
            src: "{{ temp_dir }}/vault.zip"
            dest: "{{ local_bin }}"
            remote_src: yes
            mode: "0755"
      when: install_vault

    - name: Install consul
      block:
        - name: Download consul
          get_url:
            url: "https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip"
            dest: "{{ temp_dir }}/consul.zip"
            
        - name: Extract consul
          unarchive:
            src: "{{ temp_dir }}/consul.zip"
            dest: "{{ local_bin }}"
            remote_src: yes
            mode: "0755"
      when: install_consul

    - name: Install nomad
      block:
        - name: Download nomad
          get_url:
            url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_amd64.zip"
            dest: "{{ temp_dir }}/nomad.zip"
            
        - name: Extract nomad
          unarchive:
            src: "{{ temp_dir }}/nomad.zip"
            dest: "{{ local_bin }}"
            remote_src: yes
            mode: "0755"
      when: install_nomad

    # ============================================
    # 6. CLOUD CLI TOOLS
    # ============================================
    - name: Install AWS CLI
      block:
        - name: Download AWS CLI
          get_url:
            url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
            dest: "{{ temp_dir }}/awscliv2.zip"
            
        - name: Extract AWS CLI
          unarchive:
            src: "{{ temp_dir }}/awscliv2.zip"
            dest: "{{ temp_dir }}"
            remote_src: yes
            
        - name: Install AWS CLI
          shell: |
            cd {{ temp_dir }}/aws
            ./install --install-dir /usr/local/aws-cli --bin-dir {{ local_bin }}
      when: install_aws_cli

    - name: Install Azure CLI
      block:
        - name: Add Microsoft repository (Debian)
          shell: |
            curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg > /dev/null
            echo "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/azure-cli.list
          when: is_debian
          
        - name: Install Azure CLI (Debian)
          apt:
            name: azure-cli
            state: present
          when: is_debian
          
        - name: Install Azure CLI (RedHat)
          dnf:
            name: azure-cli
            state: present
          when: is_redhat
          
        - name: Install Azure CLI (Arch)
          pacman:
            name: azure-cli
            state: present
          when: is_arch
      when: install_azure_cli

    - name: Install Google Cloud CLI
      block:
        - name: Download Google Cloud CLI
          get_url:
            url: "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz"
            dest: "{{ temp_dir }}/google-cloud-sdk.tar.gz"
            
        - name: Extract Google Cloud CLI
          unarchive:
            src: "{{ temp_dir }}/google-cloud-sdk.tar.gz"
            dest: "/opt"
            remote_src: yes
            
        - name: Install Google Cloud CLI
          shell: |
            /opt/google-cloud-sdk/install.sh --quiet --path-update true
          args:
            creates: /opt/google-cloud-sdk/bin/gcloud
            
        - name: Create symlink for gcloud
          file:
            src: /opt/google-cloud-sdk/bin/gcloud
            dest: "{{ local_bin }}/gcloud"
            state: link
      when: install_gcloud_cli

    # ============================================
    # 7. ANSIBLE
    # ============================================
    - name: Install Ansible
      block:
        - name: Install Ansible via pip (preferred)
          pip:
            name: ansible
            state: present
            executable: pip3
            
        - name: Install ansible-lint
          pip:
            name: ansible-lint
            state: present
            executable: pip3
      when: install_ansible

    # ============================================
    # 8. SHELL INTEGRATION & CONFIGURATION
    # ============================================
    - name: Add fzf to bashrc
      lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: |
          # fzf configuration
          if [ -f /usr/local/bin/fzf ]; then
            export PATH=$PATH:/usr/local/bin
            source <(fzf --bash)
          fi
        insertafter: EOF
      become: false
      when: install_fzf

    - name: Create aliases for modern tools
      lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: "{{ item }}"
        insertafter: EOF
      loop:
        - "alias cat='bat --paging=never'"
        - "alias grep='rg'"
        - "alias find='fd'"
        - "alias top='htop'"
        - "alias df='ncdu'"
        - "alias ping='mtr'"
      become: false
      when: install_bat or install_ripgrep or install_fd or install_htop

    # ============================================
    # 9. VERIFICATIE
    # ============================================
    - name: Verify installations
      shell: "{{ item }} --version 2>&1 | head -n1"
      loop:
        - kubectl
        - helm
        - terraform
        - ansible
        - docker
        - git
        - jq
        - rg
        - fd
        - bat
        - fzf
        - lazygit
        - k9s
      register: version_check
      ignore_errors: yes
      changed_when: false

    - name: Display installed versions
      debug:
        msg: "{{ version_check.results | selectattr('stdout', 'defined') | map(attribute='stdout') | list }}"

    # ============================================
    # 10. CLEANUP
    # ============================================
    - name: Remove temp directory
      file:
        path: "{{ temp_dir }}"
        state: absent

    - name: Installation complete
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════╗
          ║     DevOps & SysAdmin CLI Tools Installation Complete    ║
          ╚══════════════════════════════════════════════════════════╝
          
          📦 Installed Tools:
          ────────────────────────────────────────────────────────────
          ✅ Kubernetes: kubectl{{ ' | helm' if install_helm else '' }}{{ ' | k9s' if install_k9s else '' }}
          ✅ HashiCorp: terraform{{ ' | packer' if install_packer else '' }}{{ ' | vault' if install_vault else '' }}{{ ' | consul' if install_consul else '' }}{{ ' | nomad' if install_nomad else '' }}
          ✅ Cloud CLIs: {{ 'AWS | ' if install_aws_cli else '' }}{{ 'Azure | ' if install_azure_cli else '' }}{{ 'GCP' if install_gcloud_cli else '' }}
          ✅ Config Mgmt: {{ 'Ansible' if install_ansible else '' }}
          ✅ Modern Tools: fzf{{ ' | ripgrep' if install_ripgrep else '' }}{{ ' | fd' if install_fd else '' }}{{ ' | bat' if install_bat else '' }}{{ ' | httpie' if install_httpie else '' }}{{ ' | tldr' if install_tldr else '' }}
          ✅ Git Tools: {{ 'lazygit' if install_lazygit else '' }}
          ✅ SysAdmin: htop | ncdu | iptraf | mtr | nmap | strace | lsof | sysstat
          
          🔧 Quick Start:
          ────────────────────────────────────────────────────────────
          # Reload your shell configuration
          source ~/.bashrc
          
          # Test installations
          kubectl version --client
          terraform version
          ansible --version
          aws --version
          
          # Use modern aliases
          bat ~/.bashrc    # Better cat
          rg "error" logs/ # Better grep
          fd .py          # Better find
          
          🚀 Happy DevOps-ing!