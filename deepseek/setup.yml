---
- name: 🎨 Nord DevOps Workstation - Complete Setup
  hosts: localhost
  connection: local
  become: true
  vars:
    # ============================================
    # 🎯 INSTELLINGEN - Pas hier aan wat je wilt
    # ============================================
    target_user: "{{ ansible_user_id }}"
    
    # 🖥️ GUI & UI INSTELLINGEN
    enable_gui: true
    enable_autologin: true  # Automatisch inloggen bij opstart
    browser: "firefox"      # firefox of falkon
    
    # 🐳 DEVOPS TOOLS - Zet op false om over te slaan
    enable_docker: true
    enable_vagrant: false
    
    # ☸️ KUBERNETES TOOLS
    install_kubectl: true
    install_helm: true
    install_k9s: true
    install_kind: true      # Kubernetes in Docker
    
    # 🏗️ HASHICORP TOOLS
    install_terraform: true
    install_packer: false
    install_vault: false
    install_consul: false
    install_nomad: false
    
    # ☁️ CLOUD CLI'S
    install_aws_cli: true
    install_azure_cli: false
    install_gcloud_cli: false
    
    # 🛠️ MODERNE CLI TOOLS
    install_fzf: true
    install_ripgrep: true
    install_fd: true
    install_bat: true
    install_lazygit: true
    install_tldr: true
    install_htop: true
    
    # 📦 VERSIES
    terraform_version: "1.7.0"
    kubectl_version: "1.29.0"
    helm_version: "3.14.0"
    k9s_version: "0.32.0"
    kind_version: "0.22.0"
    
    # 🎨 NORD THEMA KLEUREN
    n0: "#2E3440"
    n1: "#3B4252"
    n2: "#434C5E"
    n3: "#4C566A"
    n4: "#D8DEE9"
    n5: "#E5E9F0"
    n6: "#ECEFF4"
    n7: "#8FBCBB"
    n8: "#88C0D0"
    n9: "#81A1C1"
    n10: "#5E81AC"
    n11: "#BF616A"
    n12: "#D08770"
    n13: "#EBCB8B"
    n14: "#A3BE8C"
    n15: "#B48EAD"
    
    # PADEN
    user_home: "/home/{{ target_user }}"
    wallpaper_url: "https://raw.githubusercontent.com/nordtheme/assets/main/wallpapers/mountains/everforest.png"
    wallpaper_path: "{{ user_home }}/.local/share/wallpapers/nord.png"
    local_bin: "/usr/local/bin"
    temp_dir: "/tmp/nord-setup"

  tasks:
    # ============================================
    # 🚀 PRETASKS - Welkomstbericht en detectie
    # ============================================
    - name: 🎬 Start Nord DevOps Workstation Setup
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════════╗
          ║                                                                  ║
          ║     🎨 NORD DEVOPS WORKSTATION - COMPLETE SETUP 🚀               ║
          ║                                                                  ║
          ║     Setting up a beautiful, functional development environment  ║
          ║     with Nord theme and essential DevOps tools                  ║
          ║                                                                  ║
          ╚══════════════════════════════════════════════════════════════════╝
          
          📋 Configuration:
          ────────────────────────────────────────────────────────────────────
          👤 User: {{ target_user }}
          🖥️  GUI: {{ '✅ Enabled' if enable_gui else '❌ Disabled' }}
          🎨 Theme: Nord (i3, Kitty, terminal, CLI tools)
          🌐 Browser: {{ browser | upper }}
          🐳 Docker: {{ '✅' if enable_docker else '❌' }}
          📦 Vagrant: {{ '✅' if enable_vagrant else '❌' }}
          
          ☸️ Kubernetes Tools: {{ '✅' if install_kubectl else '❌' }} kubectl
          {{ '   ' + '✅' if install_helm else '   ❌' }} helm
          {{ '   ' + '✅' if install_k9s else '   ❌' }} k9s
          {{ '   ' + '✅' if install_kind else '   ❌' }} kind
          
          🏗️ HashiCorp: {{ '✅' if install_terraform else '❌' }} terraform
          {{ '   ' + '✅' if install_packer else '   ❌' }} packer
          {{ '   ' + '✅' if install_vault else '   ❌' }} vault
          
          ☁️ Cloud CLIs: {{ '✅' if install_aws_cli else '❌' }} AWS
          {{ '   ' + '✅' if install_azure_cli else '   ❌' }} Azure
          {{ '   ' + '✅' if install_gcloud_cli else '   ❌' }} GCP
          
          🛠️ Modern Tools: {{ '✅' if install_fzf else '❌' }} fzf
          {{ '   ' + '✅' if install_ripgrep else '   ❌' }} ripgrep
          {{ '   ' + '✅' if install_fd else '   ❌' }} fd
          {{ '   ' + '✅' if install_bat else '   ❌' }} bat
          {{ '   ' + '✅' if install_lazygit else '   ❌' }} lazygit
          ────────────────────────────────────────────────────────────────────

    - name: 🔍 Detecting operating system
      set_fact:
        is_debian: "{{ ansible_os_family == 'Debian' }}"
        is_redhat: "{{ ansible_os_family == 'RedHat' }}"
        is_arch: "{{ ansible_distribution == 'Archlinux' }}"
        is_alpine: "{{ ansible_os_family == 'Alpine' }}"
        is_fedora: "{{ ansible_distribution == 'Fedora' }}"
        is_ubuntu: "{{ ansible_distribution == 'Ubuntu' }}"

    - name: 📊 System information
      debug:
        msg: |
          🖥️  System: {{ ansible_distribution }} {{ ansible_distribution_version }}
          📦 Package Manager: 
          {% if is_debian %}apt{% elif is_redhat %}dnf/yum{% elif is_arch %}pacman{% elif is_alpine %}apk{% endif %}
          🧠 Architecture: {{ ansible_architecture }}
          💾 Memory: {{ ansible_memtotal_mb }} MB

    - name: 📁 Creating temporary directory
      file:
        path: "{{ temp_dir }}"
        state: directory
        mode: "0755"

    - name: 🔄 Updating package cache
      package:
        update_cache: yes
      when: not is_arch

    # ============================================
    # 📦 CORE SYSTEM PACKAGES
    # ============================================
    - name: 📦 Installing core system packages
      package:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - wget
        - git
        - vim
        - htop
        - tmux
        - unzip
        - tar
        - gzip
        - make
        - gcc
        - python3
        - python3-pip
        - openssh-client
        - ca-certificates
        - gnupg
        - software-properties-common
      when: not is_alpine

    - name: 📦 Installing Alpine specific packages
      apk:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - wget
        - git
        - vim
        - htop
        - tmux
        - unzip
        - tar
        - gzip
        - make
        - gcc
        - python3
        - py3-pip
        - openssh-client
        - ca-certificates
        - gnupg
      when: is_alpine

    # ============================================
    # 🖥️ GUI SETUP (i3 + LightDM + Nord)
    # ============================================
    - name: 🖥️ Setting up GUI environment
      block:
        - name: Installing X11 and window manager
          package:
            name: "{{ item }}"
            state: present
          loop:
            - xorg
            - xinit
            - i3-wm
            - i3status
            - i3lock
            - dmenu
            - lightdm
            - lightdm-gtk-greeter
            - feh
            - picom
            - dunst
            - kitty
          when: not is_arch and not is_alpine

        - name: Installing GUI packages (Arch)
          pacman:
            name: "{{ item }}"
            state: present
          loop:
            - xorg
            - xorg-xinit
            - i3-wm
            - i3status
            - i3lock
            - dmenu
            - lightdm
            - lightdm-gtk-greeter
            - feh
            - picom
            - dunst
            - kitty
          when: is_arch

        - name: Creating configuration directories
          file:
            path: "{{ item }}"
            state: directory
            owner: "{{ target_user }}"
            mode: "0755"
          loop:
            - "{{ user_home }}/.config/i3"
            - "{{ user_home }}/.config/kitty"
            - "{{ user_home }}/.local/share/wallpapers"
            - "{{ user_home }}/.local/bin"

        - name: 🎨 Downloading Nord wallpaper
          get_url:
            url: "{{ wallpaper_url }}"
            dest: "{{ wallpaper_path }}"
            owner: "{{ target_user }}"
            mode: "0644"
          become: false

        - name: 🎨 Configuring LightDM with Nord theme
          copy:
            dest: /etc/lightdm/lightdm.conf
            content: |
              [Seat:*]
              {% if enable_autologin %}
              autologin-user={{ target_user }}
              autologin-user-timeout=0
              {% endif %}
              autologin-session=i3
              user-session=i3
              greeter-session=lightdm-gtk-greeter
              session-wrapper=/etc/lightdm/Xsession

        - name: 🎨 Configuring LightDM greeter
          copy:
            dest: /etc/lightdm/lightdm-gtk-greeter.conf
            content: |
              [greeter]
              background={{ wallpaper_path }}
              theme-name=Adwaita
              icon-theme-name=Adwaita
              font-name=Monospace 10
              xft-antialias=true
              clock-format=%H:%M
              indicators=~host;~spacer;~clock;~spacer;~session;~power

        - name: 🎨 Creating i3 desktop entry
          copy:
            dest: /usr/share/xsessions/i3.desktop
            content: |
              [Desktop Entry]
              Name=i3
              Comment=Improved tiling window manager
              Exec=i3
              Type=Application
              X-LightDM-Session=/etc/lightdm/Xsession

        - name: 🎨 Creating i3 config with Nord theme
          copy:
            dest: "{{ user_home }}/.config/i3/config"
            owner: "{{ target_user }}"
            mode: "0644"
            content: |
              # i3 config - Nord Theme 🎨
              # Generated by Nord DevOps Setup
              
              set $mod Mod4
              set $terminal kitty
              set $browser {{ browser }}
              
              # Nord Colors
              set $bg {{ n0 }}
              set $bg-inactive {{ n1 }}
              set $fg {{ n4 }}
              set $fg-inactive {{ n5 }}
              set $primary {{ n8 }}
              set $primary-bg {{ n10 }}
              set $urgent {{ n11 }}
              
              # Window colors
              client.focused          $primary-bg $primary-bg $primary   $primary-bg   $primary
              client.focused_inactive $bg-inactive $bg-inactive $fg-inactive $bg-inactive $bg-inactive
              client.unfocused        $bg-inactive $bg-inactive $fg-inactive $bg-inactive $bg-inactive
              client.urgent           $urgent      $urgent      $bg         $urgent       $urgent
              
              font pango:Monospace 10
              
              # Startup applications
              exec_always --no-startup-id feh --bg-scale "{{ wallpaper_path }}"
              exec_always --no-startup-id picom -b
              exec --no-startup-id kitty
              
              # Key bindings
              bindsym $mod+Return exec $terminal
              bindsym $mod+d exec dmenu_run -nb "{{ n0 }}" -nf "{{ n4 }}" -sb "{{ n8 }}" -sf "{{ n0 }}"
              bindsym $mod+Shift+q kill
              bindsym $mod+Shift+c reload
              bindsym $mod+Shift+e exec "i3-nagbar -t warning -m 'Exit i3?' -b 'Yes' 'i3-msg exit'"
              
              # Layout management
              bindsym $mod+h split h
              bindsym $mod+v split v
              bindsym $mod+f fullscreen toggle
              bindsym $mod+s layout stacking
              bindsym $mod+w layout tabbed
              bindsym $mod+e layout toggle split
              
              # Focus management
              bindsym $mod+Left focus left
              bindsym $mod+Down focus down
              bindsym $mod+Up focus up
              bindsym $mod+Right focus right
              
              # Move windows
              bindsym $mod+Shift+Left move left
              bindsym $mod+Shift+Down move down
              bindsym $mod+Shift+Up move up
              bindsym $mod+Shift+Right move right
              
              # Workspaces
              bindsym $mod+1 workspace 1
              bindsym $mod+2 workspace 2
              bindsym $mod+3 workspace 3
              bindsym $mod+4 workspace 4
              bindsym $mod+5 workspace 5
              bindsym $mod+6 workspace 6
              bindsym $mod+7 workspace 7
              bindsym $mod+8 workspace 8
              bindsym $mod+9 workspace 9
              bindsym $mod+0 workspace 10
              
              bindsym $mod+Shift+1 move container to workspace 1
              bindsym $mod+Shift+2 move container to workspace 2
              bindsym $mod+Shift+3 move container to workspace 3
              bindsym $mod+Shift+4 move container to workspace 4
              bindsym $mod+Shift+5 move container to workspace 5
              bindsym $mod+Shift+6 move container to workspace 6
              bindsym $mod+Shift+7 move container to workspace 7
              bindsym $mod+Shift+8 move container to workspace 8
              bindsym $mod+Shift+9 move container to workspace 9
              bindsym $mod+Shift+10 move container to workspace 10
              
              # Resize mode
              mode "resize" {
                  bindsym Left resize shrink width 10 px or 10 ppt
                  bindsym Down resize grow height 10 px or 10 ppt
                  bindsym Up resize shrink height 10 px or 10 ppt
                  bindsym Right resize grow width 10 px or 10 ppt
                  bindsym Return mode "default"
                  bindsym Escape mode "default"
              }
              bindsym $mod+r mode "resize"
              
              # Status bar
              bar {
                  position top
                  status_command i3status
                  colors {
                      background $bg
                      statusline $fg
                      separator $bg-inactive
                      focused_workspace  $primary-bg $primary-bg $primary
                      active_workspace   $bg-inactive $bg-inactive $fg-inactive
                      inactive_workspace $bg-inactive $bg-inactive $fg-inactive
                      urgent_workspace   $urgent $urgent $bg
                  }
              }

        - name: 🎨 Configuring Kitty terminal with Nord theme
          copy:
            dest: "{{ user_home }}/.config/kitty/kitty.conf"
            owner: "{{ target_user }}"
            mode: "0644"
            content: |
              # Kitty - Nord Theme 🎨
              font_size 12
              font_family monospace
              
              background {{ n0 }}
              foreground {{ n4 }}
              selection_background {{ n4 }}
              selection_foreground {{ n0 }}
              
              color0 {{ n1 }}
              color1 {{ n11 }}
              color2 {{ n14 }}
              color3 {{ n13 }}
              color4 {{ n9 }}
              color5 {{ n15 }}
              color6 {{ n8 }}
              color7 {{ n5 }}
              color8 {{ n3 }}
              color9 {{ n11 }}
              color10 {{ n14 }}
              color11 {{ n13 }}
              color12 {{ n9 }}
              color13 {{ n15 }}
              color14 {{ n7 }}
              color15 {{ n6 }}
              
              cursor {{ n8 }}
              cursor_text_color {{ n0 }}
          become: false

        - name: 🎨 Configuring terminal colors (Xresources)
          copy:
            dest: "{{ user_home }}/.Xresources"
            owner: "{{ target_user }}"
            mode: "0644"
            content: |
              ! Nord Theme for Xresources 🎨
              *background: {{ n0 }}
              *foreground: {{ n4 }}
              *cursorColor: {{ n8 }}
              *color0: {{ n1 }}
              *color1: {{ n11 }}
              *color2: {{ n14 }}
              *color3: {{ n13 }}
              *color4: {{ n9 }}
              *color5: {{ n15 }}
              *color6: {{ n8 }}
              *color7: {{ n5 }}
              *color8: {{ n3 }}
              *color9: {{ n11 }}
              *color10: {{ n14 }}
              *color11: {{ n13 }}
              *color12: {{ n9 }}
              *color13: {{ n15 }}
              *color14: {{ n7 }}
              *color15: {{ n6 }}
          become: false

        - name: 🎨 Configuring Vim with Nord theme
          copy:
            dest: "{{ user_home }}/.vimrc"
            owner: "{{ target_user }}"
            mode: "0644"
            content: |
              " Vim config with Nord theme 🎨
              syntax on
              set number
              set relativenumber
              set background=dark
              colorscheme desert
              set tabstop=4
              set shiftwidth=4
              set expandtab
              set autoindent
          become: false

        - name: 🎨 Configuring Tmux with Nord theme
          copy:
            dest: "{{ user_home }}/.tmux.conf"
            owner: "{{ target_user }}"
            mode: "0644"
            content: |
              # Tmux config - Nord inspired 🎨
              set -g status-bg colour235
              set -g status-fg colour250
              set -g status-left '#[fg=green]#H'
              set -g status-right '#[fg=yellow]#(uptime | cut -d " " -f 4-5)'
              set -g window-status-current-bg colour237
              set -g mouse on
          become: false

        - name: 🚀 Enabling LightDM service
          systemd:
            name: lightdm
            enabled: yes
            state: started
          when: not is_alpine

        - name: 🌐 Installing browser
          package:
            name: "{{ 'firefox' if browser == 'firefox' else 'falkon' }}"
            state: present
          when: not is_alpine

      when: enable_gui

    # ============================================
    # 🐳 DOCKER INSTALLATION
    # ============================================
    - name: 🐳 Installing Docker (official method)
      block:
        - name: Adding Docker repository (Debian)
          shell: |
            curl -fsSL https://download.docker.com/linux/{{ ansible_distribution|lower }}/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution|lower }} {{ ansible_distribution_release }} stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          when: is_debian

        - name: Installing Docker (Debian)
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present
          when: is_debian

        - name: Adding Docker repository (RedHat)
          get_url:
            url: https://download.docker.com/linux/centos/docker-ce.repo
            dest: /etc/yum.repos.d/docker-ce.repo
          when: is_redhat

        - name: Installing Docker (RedHat)
          dnf:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present
          when: is_redhat

        - name: Installing Docker (Arch)
          pacman:
            name:
              - docker
              - docker-compose
            state: present
          when: is_arch

        - name: Starting Docker service
          systemd:
            name: docker
            state: started
            enabled: yes

        - name: Adding user to docker group
          user:
            name: "{{ target_user }}"
            groups: docker
            append: yes

        - name: 🐳 Docker installed successfully
          debug:
            msg: "✅ Docker installed with official repository"
      when: enable_docker

    # ============================================
    # ☸️ KUBERNETES TOOLS
    # ============================================
    - name: ☸️ Installing kubectl
      get_url:
        url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: "{{ local_bin }}/kubectl"
        mode: "0755"
      when: install_kubectl

    - name: ☸️ Installing helm
      block:
        - name: Downloading helm
          get_url:
            url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
            dest: "{{ temp_dir }}/helm.tar.gz"
        - name: Extracting helm
          unarchive:
            src: "{{ temp_dir }}/helm.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
        - name: Installing helm
          copy:
            src: "{{ temp_dir }}/linux-amd64/helm"
            dest: "{{ local_bin }}/helm"
            mode: "0755"
            remote_src: yes
      when: install_helm

    - name: ☸️ Installing k9s
      block:
        - name: Downloading k9s
          get_url:
            url: "https://github.com/derailed/k9s/releases/download/v{{ k9s_version }}/k9s_Linux_amd64.tar.gz"
            dest: "{{ temp_dir }}/k9s.tar.gz"
        - name: Extracting k9s
          unarchive:
            src: "{{ temp_dir }}/k9s.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
        - name: Installing k9s
          copy:
            src: "{{ temp_dir }}/k9s"
            dest: "{{ local_bin }}/k9s"
            mode: "0755"
            remote_src: yes
      when: install_k9s

    - name: ☸️ Installing kind
      get_url:
        url: "https://kind.sigs.k8s.io/dl/v{{ kind_version }}/kind-linux-amd64"
        dest: "{{ local_bin }}/kind"
        mode: "0755"
      when: install_kind

    # ============================================
    # 🏗️ HASHICORP TOOLS
    # ============================================
    - name: 🏗️ Installing Terraform
      block:
        - name: Downloading Terraform
          get_url:
            url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
            dest: "{{ temp_dir }}/terraform.zip"
        - name: Extracting Terraform
          unarchive:
            src: "{{ temp_dir }}/terraform.zip"
            dest: "{{ local_bin }}"
            remote_src: yes
            mode: "0755"
      when: install_terraform

    # ============================================
    # ☁️ CLOUD CLI TOOLS
    # ============================================
    - name: ☁️ Installing AWS CLI
      block:
        - name: Downloading AWS CLI
          get_url:
            url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
            dest: "{{ temp_dir }}/awscliv2.zip"
        - name: Extracting AWS CLI
          unarchive:
            src: "{{ temp_dir }}/awscliv2.zip"
            dest: "{{ temp_dir }}"
            remote_src: yes
        - name: Installing AWS CLI
          shell: |
            cd {{ temp_dir }}/aws
            ./install --install-dir /usr/local/aws-cli --bin-dir {{ local_bin }}
      when: install_aws_cli

    # ============================================
    # 🛠️ MODERN CLI TOOLS
    # ============================================
    - name: 🛠️ Installing fzf
      block:
        - name: Cloning fzf repository
          git:
            repo: https://github.com/junegunn/fzf.git
            dest: "{{ temp_dir }}/fzf"
            version: master
          become: false
        - name: Installing fzf
          shell: |
            cd {{ temp_dir }}/fzf
            ./install --bin
            cp fzf {{ local_bin }}/
          become: false
      when: install_fzf

    - name: 🛠️ Installing ripgrep
      get_url:
        url: "https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ temp_dir }}/ripgrep.tar.gz"
      when: install_ripgrep

    - name: Extracting and installing ripgrep
      block:
        - name: Extract ripgrep
          unarchive:
            src: "{{ temp_dir }}/ripgrep.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
        - name: Install ripgrep
          copy:
            src: "{{ temp_dir }}/ripgrep-14.1.0-x86_64-unknown-linux-musl/rg"
            dest: "{{ local_bin }}/rg"
            mode: "0755"
            remote_src: yes
      when: install_ripgrep

    - name: 🛠️ Installing bat
      block:
        - name: Downloading bat
          get_url:
            url: "https://github.com/sharkdp/bat/releases/download/v0.24.0/bat-v0.24.0-x86_64-unknown-linux-musl.tar.gz"
            dest: "{{ temp_dir }}/bat.tar.gz"
        - name: Extracting bat
          unarchive:
            src: "{{ temp_dir }}/bat.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
        - name: Installing bat
          copy:
            src: "{{ temp_dir }}/bat-v0.24.0-x86_64-unknown-linux-musl/bat"
            dest: "{{ local_bin }}/bat"
            mode: "0755"
            remote_src: yes
      when: install_bat

    - name: 🛠️ Installing lazygit
      block:
        - name: Downloading lazygit
          get_url:
            url: "https://github.com/jesseduffield/lazygit/releases/download/v0.40.2/lazygit_0.40.2_Linux_x86_64.tar.gz"
            dest: "{{ temp_dir }}/lazygit.tar.gz"
        - name: Extracting lazygit
          unarchive:
            src: "{{ temp_dir }}/lazygit.tar.gz"
            dest: "{{ temp_dir }}"
            remote_src: yes
        - name: Installing lazygit
          copy:
            src: "{{ temp_dir }}/lazygit"
            dest: "{{ local_bin }}/lazygit"
            mode: "0755"
            remote_src: yes
      when: install_lazygit

    - name: 🛠️ Installing tldr
      npm:
        name: tldr
        global: yes
        state: present
      when: install_tldr
      ignore_errors: yes

    # ============================================
    # 🎨 SHELL CONFIGURATION & ALIASES
    # ============================================
    - name: 🎨 Creating .bash_aliases with Nord style
      copy:
        dest: "{{ user_home }}/.bash_aliases"
        owner: "{{ target_user }}"
        mode: "0644"
        content: |
          # Modern CLI aliases with Nord style 🎨
          alias ls='ls --color=auto'
          alias ll='ls -alF'
          alias la='ls -A'
          alias l='ls -CF'
          
          {% if install_bat %}alias cat='bat --paging=never'{% endif %}
          {% if install_ripgrep %}alias grep='rg'{% endif %}
          {% if install_fd %}alias find='fd'{% endif %}
          alias top='htop'
          alias df='ncdu'
          alias ping='mtr'
          
          # Git aliases
          alias gs='git status'
          alias ga='git add'
          alias gc='git commit'
          alias gp='git push'
          alias gl='git log --oneline --graph'
          {% if install_lazygit %}alias lg='lazygit'{% endif %}
          
          # Kubernetes aliases
          alias k='kubectl'
          alias kg='kubectl get'
          alias kd='kubectl describe'
          alias kl='kubectl logs'
          alias kx='kubectl exec -it'
          alias kgp='kubectl get pods'
          alias kgs='kubectl get services'
          alias kgd='kubectl get deployments'
          
          # Docker aliases
          alias d='docker'
          alias dc='docker-compose'
          alias dps='docker ps'
          alias di='docker images'
          alias dex='docker exec -it'
          
          # Terraform aliases
          alias tf='terraform'
          alias tfi='terraform init'
          alias tfp='terraform plan'
          alias tfa='terraform apply'
          alias tfd='terraform destroy'
          
          # System aliases
          alias update='sudo apt update && sudo apt upgrade -y'
          alias cleanup='sudo apt autoremove -y && sudo apt autoclean'
      become: false

    - name: 🎨 Adding fzf to bashrc
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: |
          # fzf configuration
          if [ -f /usr/local/bin/fzf ]; then
            export PATH=$PATH:/usr/local/bin
            source <(fzf --bash)
          fi
          
          # Nord style prompt
          export PS1='\[\033[38;5;111m\]\u\[\033[38;5;67m\]@\[\033[38;5;81m\]\h\[\033[0m\]:\[\033[38;5;150m\]\w\[\033[0m\]\$ '
          
          # Load aliases
          if [ -f ~/.bash_aliases ]; then
              . ~/.bash_aliases
          fi
        insertafter: EOF
      become: false
      when: install_fzf

    # ============================================
    # 🧹 CLEANUP & SUMMARY
    # ============================================
    - name: 🧹 Cleaning up temporary files
      file:
        path: "{{ temp_dir }}"
        state: absent

    - name: 🎉 Installation complete - Displaying summary
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════════╗
          ║                                                                  ║
          ║     🎉 NORD DEVOPS WORKSTATION - INSTALLATION COMPLETE 🎉        ║
          ║                                                                  ║
          ╚══════════════════════════════════════════════════════════════════╝
          
          ✨ What's been installed:
          ────────────────────────────────────────────────────────────────────
          🖥️  Desktop Environment: i3 + LightDM (Nord themed)
          🎨 Terminal: Kitty with Nord colorscheme
          🌐 Browser: {{ browser | title }}
          🐳 Container: Docker + Docker Compose
          
          ☸️ Kubernetes Tools:
          {% if install_kubectl %}   ✅ kubectl v{{ kubectl_version }}{% endif %}
          {% if install_helm %}   ✅ helm v{{ helm_version }}{% endif %}
          {% if install_k9s %}   ✅ k9s v{{ k9s_version }}{% endif %}
          {% if install_kind %}   ✅ kind v{{ kind_version }}{% endif %}
          
          🏗️ Infrastructure:
          {% if install_terraform %}   ✅ Terraform v{{ terraform_version }}{% endif %}
          {% if install_aws_cli %}   ✅ AWS CLI{% endif %}
          
          🛠️ Developer Tools:
          {% if install_fzf %}   ✅ fzf (fuzzy finder){% endif %}
          {% if install_ripgrep %}   ✅ ripgrep (better grep){% endif %}
          {% if install_fd %}   ✅ fd (better find){% endif %}
          {% if install_bat %}   ✅ bat (better cat){% endif %}
          {% if install_lazygit %}   ✅ lazygit (terminal git UI){% endif %}
          {% if install_tldr %}   ✅ tldr (simplified man pages){% endif %}
          
          🎯 Quick Start Guide:
          ────────────────────────────────────────────────────────────────────
          1️⃣  Reboot your system to start LightDM:
              sudo reboot
          
          2️⃣  After login, i3 will start automatically
          
          3️⃣  Essential i3 shortcuts:
              🪟 Mod (Windows key) + Enter  → Open terminal
              🔍 Mod + d                    → Open dmenu