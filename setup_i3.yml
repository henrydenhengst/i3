---
- name: "The Absolute Omni-Protocol: Nord DevOps & Zsh Master"
  hosts: localhost
  connection: local
  become: yes

  vars:
    # --- NORD KLEURENPALET ---
    nord0:  "#2e3440" # Background
    nord3:  "#4c566a" # Lichtgrijs (segmenten)
    nord8:  "#88c0d0" # Frost Blue (Accent)
    nord10: "#5e81ac" # Deep Blue (Segmenten)
    nord11: "#bf616a" # Rood (Error)
    nord14: "#a3be8c" # Groen (Success)

    # --- VOLLEDIGE TOOLSET ---
    zsh_power: [zsh, zsh-autosuggestions, zsh-syntax-highlighting, fzf]
    devops_stack: [kubectl, terraform, azure-cli, awscli, eza]
    modern_unix: [bat, ripgrep, jq, yq, btop, nmap, mtr, glances]
    gui_stack: [i3-wm, kitty, tmux, polybar, rofi, picom, feh, dunst, light]
    file_management: [nnn, ffmpegthumbnailer, mediainfo, sxiv]

  tasks:
    - name: "1. Pakketten Installeren (APT)"
      apt:
        name: "{{ zsh_power + devops_stack + modern_unix + gui_stack + file_management }}"
        state: present
        update_cache: yes

    - name: "2. Externe Binaries (Starship & Zoxide)"
      shell: |
        curl -sS https://starship.rs/install.sh | sh -s -- -y
        curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
      args:
        executable: /bin/bash

    - name: "3. Gebruikersinstellingen & Shell Switch"
      shell: |
        usermod -aG docker,video {{ lookup('env', 'USER') }}
        chsh -s $(which zsh) {{ lookup('env', 'USER') }}

    - name: "4. Config Mappen Aanmaken"
      become: no
      file:
        path: "~/.config/{{ item }}"
        state: directory
      loop: [i3, polybar, rofi, kitty, nnn, starship]

    - name: "5. Zshrc - De DevOps Motor (Historie & Inits)"
      become: no
      blockinfile:
        path: "~/.zshrc"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # --- HISTORIE ---
          HISTFILE=~/.zsh_history
          HISTSIZE=10000
          SAVEHIST=10000
          setopt APPEND_HISTORY
          setopt SHARE_HISTORY
          setopt HIST_IGNORE_DUPS
          
          autoload -Uz compinit && compinit
          export PATH=$PATH:/usr/local/bin:$HOME/.local/bin
          
          # Plugins & Aliassen
          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh
          
          alias n='nnn -a -P p'
          alias k='kubectl'
          alias gupdate='~/git/i3/update_git.sh'
          alias ls='eza --icons --group-directories-first'
          alias hgrep='history | grep'
          
          # Inits
          eval "$(starship init zsh)"
          eval "$(zoxide init zsh)"

    - name: "6. Starship Nord Powerline Theme (Fix Syntax)"
      become: no
      copy:
        dest: "~/.config/starship.toml"
        content: |
          format = """[]({{ nord8 }})$directory[](fg:{{ nord8 }} bg:{{ nord3 }})$git_branch$git_status[](fg:{{ nord3 }} bg:{{ nord10 }})$kubernetes[](fg:{{ nord10 }}) $line_break$character"""
          add_newline = false

          [directory]
          style = "bg:{{ nord8 }} fg:{{ nord0 }} bold"
          format = "[ $path ]($style)"
          truncation_length = 3

          [git_branch]
          symbol = "  "
          style = "bg:{{ nord3 }} fg:{{ nord8 }} bold"
          format = "[$symbol$branch]($style)"

          [git_status]
          style = "bg:{{ nord3 }} fg:{{ nord11 }} bold"
          format = "([$all_status$ahead_behind]($style))"

          [kubernetes]
          symbol = " ☸ "
          disabled = false
          style = "bg:{{ nord10 }} fg:{{ nord0 }} bold"
          format = "[$symbol$context]($style)"

          [character]
          success_symbol = "[❯](bold {{ nord14 }})"
          error_symbol = "[✖](bold {{ nord11 }})"

    - name: "7. Kitty Terminal Config (Nord + Transparant)"
      become: no
      copy:
        dest: "~/.config/kitty/kitty.conf"
        content: |
          font_family      JetBrainsMono Nerd Font
          font_size        11.0
          background       {{ nord0 }}
          foreground       #d8dee9
          background_opacity 0.90
          confirm_os_window_close 0
          window_padding_width 10

    - name: "8. i3 Config (Wallpaper & Hardware)"
      become: no
      copy:
        dest: "~/.config/i3/config"
        content: |
          set $mod Mod4
          font pango:JetBrainsMono Nerd Font 10

          # --- APPEARANCE ---
          exec_always --no-startup-id feh --bg-fill /usr/share/backgrounds/1366x768-wallpaper18.jpg
          exec_always --no-startup-id ~/.config/polybar/launch.sh

          # --- HARDWARE SNELTOETSEN ---
          bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +5%
          bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -5%
          bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle
          bindsym XF86MonBrightnessUp exec --no-startup-id light -A 5
          bindsym XF86MonBrightnessDown exec --no-startup-id light -U 5

          # --- WINDOW MANAGEMENT ---
          bindsym $mod+Return exec kitty
          bindsym $mod+d exec rofi -show drun
          bindsym $mod+Shift+q kill
          bindsym $mod+Shift+r restart
          
          # Styling
          client.focused {{ nord8 }} {{ nord8 }} {{ nord0 }} {{ nord8 }}
          gaps inner 10
          new_window pixel 2

    - name: "9. Bulletproof Git Update Script"
      become: no
      copy:
        dest: "~/git/i3/update_git.sh"
        mode: "0755"
        content: |
          #!/bin/bash
          BLUE='\033[0;81m'
          GREEN='\033[0;32m'
          WHITE='\033[0;37m'
          NC='\033[0m'
          set -e
          cd "$(dirname "$0")"
          echo -e "${BLUE}🚀 Homelab Git Update gestart...${NC}"
          git stash
          git pull origin main --rebase
          git stash pop || true
          if [ -z "$(git status --porcelain)" ]; then
              echo -e "${BLUE}✨ Al up-to-date.${NC}"
              exit 0
          fi
          git add .
          echo -ne "${WHITE}📝 Commit message: ${NC}"
          read msg
          [ -z "$msg" ] && msg="Update: $(date +'%Y-%m-%d %H:%M')"
          git commit -m "$msg"
          git push origin main && echo -e "${GREEN}✅ Alles succesvol bijgewerkt!${NC}"

    - name: "10. Polybar Launcher"
      become: no
      copy:
        dest: "~/.config/polybar/launch.sh"
        mode: "0755"
        content: |
          #!/bin/bash
          killall -q polybar
          polybar main &
