---
- name: "The Absolute Omni-Protocol: Nord DevOps, Sysadmin & Hybrid Container Master"
  hosts: localhost
  connection: local
  become: yes

  vars:
    # --- NORD KLEURENPALET ---
    nord0:  "#2e3440" # Background
    nord1:  "#3b4252" # Statusbars
    nord8:  "#88c0d0" # Frost Blue (Accent)
    nord4:  "#d8dee9" # Snow White

    # --- VOLLEDIGE TOOLSET (Gefilterd op Repo-beschikbaarheid) ---
    zsh_power: [zsh, zsh-autosuggestions, zsh-syntax-highlighting, fzf]
    devops_stack: [kubectl, terraform, azure-cli, awscli, eza]
    modern_unix: [bat, ripgrep, jq, yq, btop, nmap, mtr, glances, termshark]
    gui_stack: [i3-wm, kitty, tmux, polybar, rofi, picom, feh, dunst, light, pavucontrol, falkon]
    file_management: [nnn, ranger, mc, ffmpegthumbnailer, mediainfo, imagemagick, poppler-utils]
    light_virt: [vagrant, qemu-kvm, libvirt-daemon-system, libvirt-clients, podman, buildah, skopeo]

  tasks:
    # --- 1. REPO PREPARATIE ---
    - name: "1. Repositories & Keyrings Injectie"
      shell: |
        mkdir -p /etc/apt/keyrings
        # Kubectl
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/k8s.gpg --yes
        echo 'deb [signed-by=/etc/apt/keyrings/k8s.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' > /etc/apt/sources.list.d/k8s.list
        # Terraform
        wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /etc/apt/keyrings/hashicorp.gpg --yes
        echo "deb [signed-by=/etc/apt/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main" > /etc/apt/sources.list.d/hashicorp.list
        # Eza
        wget -qO- https://raw.githubusercontent.com/eza-community/eza/main/deb.asc | gpg --dearmor -o /etc/apt/keyrings/eza.gpg --yes
        echo "deb [signed-by=/etc/apt/keyrings/eza.gpg] http://deb.gierens.de stable main" > /etc/apt/sources.list.d/eza.list
      args:
        executable: /bin/bash

    # --- 2. BINARY INSTALLATIE (Voor tools buiten APT) ---
    - name: "2. Installeer Externe Binaries (Helm, Starship, Zoxide, Gping, Dust)"
      shell: |
        # Core Binary Installers
        curl -sS https://starship.rs/install.sh | sh -s -- -y
        curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        curl -sL https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash
        # Gping & Dust handmatige download
        cd /tmp
        URL_GPING=$(curl -s https://api.github.com/repos/orf/gping/releases/latest | grep browser_download_url | grep x86_64-unknown-linux-musl.tar.gz | cut -d '"' -f 4)
        wget -O gping.tar.gz "$URL_GPING" && tar -xvzf gping.tar.gz && mv gping /usr/local/bin/
        URL_DUST=$(curl -s https://api.github.com/repos/bootandy/dust/releases/latest | grep browser_download_url | grep x86_64-unknown-linux-musl.tar.gz | cut -d '"' -f 4)
        wget -O dust.tar.gz "$URL_DUST" && tar -xvzf dust.tar.gz && mv dust-*/dust /usr/local/bin/
        rm -rf gping.tar.gz dust.tar.gz dust-*
      args:
        executable: /bin/bash
        creates: /usr/local/bin/gping

    # --- 3. DE GROTE APT INSTALLATIE ---
    - name: "3. Installeer de Hoofdstack via APT"
      apt:
        name: "{{ zsh_power + devops_stack + modern_unix + gui_stack + file_management + light_virt }}"
        state: present
        update_cache: yes
      ignore_errors: yes

    # --- 4. GEBRUIKER & RECHTEN ---
    - name: "4. Systeemrechten (Shell, Docker, KVM)"
      shell: |
        for g in docker libvirt kvm; do groupadd -f $g; done
        usermod -aG docker,libvirt,kvm {{ lookup('env', 'USER') }}
        chsh -s $(which zsh) {{ lookup('env', 'USER') }}

    - name: "5. Maak alle Config Mappen aan"
      become: no
      file:
        path: "~/.config/{{ item }}"
        state: directory
      loop: [i3, polybar, rofi, kitty, nnn, nvim, starship, btop, k9s, ranger, falkon, dunst, picom]

    - name: "6. Installeer JetBrainsMono Nerd Font"
      become: no
      shell: |
        mkdir -p ~/.local/share/fonts
        curl -L https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.tar.xz | tar --extract --xz -C ~/.local/share/fonts
        fc-cache -fv
      args:
        creates: "~/.local/share/fonts/JetBrainsMonoNerdFont-Regular.ttf"

    # --- 5. LEGACY DOTFILE MIGRATIE ---
    - name: "7. Importeer oude Bashrc & Vimrc"
      become: no
      slurp:
        src: "~/{{ item }}"
      register: legacy_files
      ignore_errors: yes
      loop: [".bashrc", ".vimrc"]

    # --- 6. GUI CONFIGURATIE (Nordic i3wm) ---
    - name: "8. Configureer i3 & Polybar (Nordic Block)"
      become: no
      copy:
        dest: "{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
        content: "{{ item.content }}"
      loop:
        - { dest: "~/.config/i3/config", content: "set $mod Mod4\nfont pango:JetBrainsMono Nerd Font 10\nclient.focused {{ nord8 }} {{ nord8 }} {{ nord0 }} {{ nord8 }} {{ nord8 }}\nexec_always --no-startup-id ~/.config/polybar/launch.sh\nbindsym $mod+Return exec kitty\nbindsym $mod+d exec rofi -show drun\ngaps inner 8\nnew_window pixel 2" }
        - { dest: "~/.config/polybar/launch.sh", mode: "0755", content: "#!/bin/bash\nkillall -q polybar\npolybar main &" }
        - { dest: "~/.config/polybar/config.ini", content: "[bar/main]\nwidth=100%\nheight=26\nbackground={{ nord0 }}\nforeground={{ nord4 }}\nfont-0=\"JetBrainsMono Nerd Font:size=10;2\"\nmodules-center=date\n[module/date]\ntype=internal/date\ndate=\" %H:%M \"\nformat-foreground={{ nord8 }}" }

    # --- 7. SYSADMIN ENGINE (Zsh, Tmux) ---
    - name: "9. Zshrc - De DevOps Motor"
      become: no
      blockinfile:
        path: "~/.zshrc"
        create: yes
        block: |
          export PATH=$PATH:/usr/local/bin:$HOME/.local/bin
          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh
          alias k='kubectl'
          alias h='helm'
          alias ldo='lazydocker'
          if command -v batcat > /dev/null; then alias bat='batcat'; fi
          if command -v eza > /dev/null; then alias ls='eza --icons --group-directories-first'; else alias ls='ls --color=auto'; fi
          eval "$(starship init zsh)"
          eval "$(zoxide init zsh)"
          # --- GEÏMPORTEERD UIT BASHRC ---
          {{ legacy_files.results[0].content | b64decode if not (legacy_files.results[0].failed | default(true)) else '# No legacy bashrc' }}

    - name: "10. Skins & Finalisatie"
      become: no
      shell: |
        curl -Ls https://raw.githubusercontent.com/derailed/k9s/master/skins/nord.yaml > ~/.config/k9s/skin.yml
        curl -Ls https://raw.githubusercontent.com/aristocratos/btop/main/themes/nord.theme > ~/.config/btop/themes/nord.theme
        vagrant plugin install vagrant-libvirt || true
      ignore_errors: yes
