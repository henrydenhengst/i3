---
- name: "The Absolute Omni-Protocol: Nord DevOps & Zsh Master"
  hosts: localhost
  connection: local
  become: yes

  vars:
    # --- NORD KLEURENPALET ---
    nord0:  "#2e3440" # Background
    nord8:  "#88c0d0" # Frost Blue (Accent)
    nord4:  "#d8dee9" # Snow White

    # --- VOLLEDIGE TOOLSET ---
    zsh_power: [zsh, zsh-autosuggestions, zsh-syntax-highlighting, fzf]
    devops_stack: [kubectl, terraform, azure-cli, awscli, eza]
    modern_unix: [bat, ripgrep, jq, yq, btop, nmap, mtr, glances]
    gui_stack: [i3-wm, kitty, tmux, polybar, rofi, picom, feh, dunst, light]
    file_management: [nnn, ffmpegthumbnailer, mediainfo, sxiv]

  tasks:
    - name: "1. Pakketten Installeren (APT)"
      apt:
        name: "{{ zsh_power + devops_stack + modern_unix + gui_stack + file_management }}"
        state: present
        update_cache: yes

    - name: "2. Externe Binaries (Starship & Zoxide)"
      shell: |
        curl -sS https://starship.rs/install.sh | sh -s -- -y
        curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
      args:
        executable: /bin/bash

    - name: "3. Gebruikersinstellingen & Shell Switch"
      shell: |
        usermod -aG docker,video {{ lookup('env', 'USER') }}
        chsh -s $(which zsh) {{ lookup('env', 'USER') }}

    - name: "4. Config Mappen Aanmaken"
      become: no
      file:
        path: "~/.config/{{ item }}"
        state: directory
      loop: [i3, polybar, rofi, kitty, nnn, btop]

    - name: "5. Zshrc - De DevOps Motor (Met Historie Fix)"
      become: no
      blockinfile:
        path: "~/.zshrc"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # --- HISTORIE INSTELLINGEN (Pijltje omhoog fix) ---
          HISTFILE=~/.zsh_history
          HISTSIZE=10000
          SAVEHIST=10000
          setopt APPEND_HISTORY          # Voeg toe aan bestand, overschrijf niet
          setopt SHARE_HISTORY           # Deel historie tussen alle open terminals
          setopt HIST_IGNORE_DUPS        # Negeer dubbele commando's achter elkaar
          setopt HIST_REDUCE_BLANKS      # Verwijder overtollige spaties
          
          # Native Zsh Completion
          autoload -Uz compinit && compinit
          
          export PATH=$PATH:/usr/local/bin:$HOME/.local/bin
          
          # Plugins laden
          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh
          
          # Aliassen
          alias n='nnn -a -P p'
          alias k='kubectl'
          alias gupdate='~/git/i3/update_git.sh'
          alias ls='eza --icons --group-directories-first'
          alias hgrep='history | grep'
          
          # Inits
          eval "$(starship init zsh)"
          eval "$(zoxide init zsh)"

    - name: "6. i3 Config (Wallpaper, Hardware & Styling)"
      become: no
      copy:
        dest: "~/.config/i3/config"
        content: |
          set $mod Mod4
          font pango:JetBrainsMono Nerd Font 10

          # --- APPEARANCE ---
          # Jouw specifieke wallpaper uit /usr/share/backgrounds
          exec_always --no-startup-id feh --bg-fill /usr/share/backgrounds/1366x768-wallpaper18.jpg
          exec_always --no-startup-id ~/.config/polybar/launch.sh

          # --- HARDWARE SNELTOETSEN ---
          # Volume
          bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +5%
          bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -5%
          bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle
          
          # Helderheid (via 'light')
          bindsym XF86MonBrightnessUp exec --no-startup-id light -A 5
          bindsym XF86MonBrightnessDown exec --no-startup-id light -U 5

          # --- WINDOW MANAGEMENT ---
          bindsym $mod+Return exec kitty
          bindsym $mod+d exec rofi -show drun
          bindsym $mod+Shift+q kill
          bindsym $mod+Shift+r restart
          
          # Nord Styling
          client.focused {{ nord8 }} {{ nord8 }} {{ nord0 }} {{ nord8 }} {{ nord8 }}
          gaps inner 10
          new_window pixel 2

    - name: "7. Bulletproof Git Update Script"
      become: no
      copy:
        dest: "~/git/i3/update_git.sh"
        mode: "0755"
        content: |
          #!/bin/bash
          BLUE='\033[0;81m'
          GREEN='\033[0;32m'
          WHITE='\033[0;37m'
          NC='\033[0m'
          set -e
          cd "$(dirname "$0")"
          echo -e "${BLUE}🚀 Homelab Git Update gestart...${NC}"
          
          git stash
          echo -e "${WHITE}📥 Syncen met GitHub...${NC}"
          git pull origin main --rebase
          git stash pop || true
          
          if [ -z "$(git status --porcelain)" ]; then
              echo -e "${BLUE}✨ Geen wijzigingen om te committen.${NC}"
              exit 0
          fi
          
          git add .
          echo -ne "${WHITE}📝 Commit message: ${NC}"
          read msg
          [ -z "$msg" ] && msg="Daily update: $(date +'%Y-%m-%d %H:%M')"
          
          git commit -m "$msg"
          echo -e "${BLUE}📤 Pushen naar GitHub...${NC}"
          git push origin main && echo -e "${GREEN}✅ Alles succesvol bijgewerkt!${NC}"

    - name: "8. Polybar Launcher"
      become: no
      copy:
        dest: "~/.config/polybar/launch.sh"
        mode: "0755"
        content: |
          #!/bin/bash
          killall -q polybar
          polybar main &
