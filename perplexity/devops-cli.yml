---
- name: DevOps & SysAdmin CLI Tools (Standalone)
  hosts: localhost  
  become: true
  vars:
    enable_tools: true
    enable_cloud: true
    enable_monitoring: true
    enable_k8s: false

  tasks:
    - name: Detect OS
      set_fact:
        is_debian: "{{ ansible_facts.os_family == 'Debian' }}"
        is_redhat: "{{ ansible_facts.os_family == 'RedHat' }}"
        is_arch: "{{ ansible_facts.distribution == 'Archlinux' }}"
        is_alpine: "{{ ansible_facts.distribution == 'Alpine' }}"

    - name: Update repos
      block:
        - apt: update_cache=yes cache_valid_time=3600
          when: is_debian
        - dnf: update_cache=yes
          when: is_redhat
        - pacman: update_cache=yes
          when: is_arch
        - apk: update_cache=yes
          when: is_alpine

    # CORE DEVOPS TOOLS
    - name: Essential CLI tools
      block:
        - name: Debian
          apt:
            name:
              - git
              - curl
              - wget
              - jq
              - htop
              - tree
              - unzip
              - rsync
              - tmux
              - vim
              - neovim
              - fzf
              - bat
              - ripgrep
            state: present
          when: is_debian

        - name: RedHat
          dnf:
            name:
              - git
              - curl
              - wget
              - jq
              - htop
              - tree
              - unzip
              - rsync
              - tmux
              - vim
              - neovim
              - fzf
              - bat
              - ripgrep
            state: present
          when: is_redhat

        - name: Arch
          pacman:
            name:
              - git
              - curl
              - wget
              - jq
              - htop
              - tree
              - unzip
              - rsync
              - tmux
              - neovim
              - fzf
              - bat
              - ripgrep
            state: present
          when: is_arch

        - name: Alpine
          apk:
            name:
              - git
              - curl
              - wget
              - jq
              - htop
              - tree
              - unzip
              - rsync
              - tmux
              - vim
              - neovim
              - fzf
              - bat
              - ripgrep
            repositories:
              - http://dl-cdn.alpinelinux.org/alpine/edge/community
            state: present
          when: is_alpine

    # DOCKER + CONTAINER TOOLS (official)
    - name: Docker CLI + compose
      block:
        - name: Docker Debian official
          block:
            - apt_key:
                url: https://download.docker.com/linux/ubuntu/gpg
                keyring: /usr/share/keyrings/docker-archive-keyring.gpg
            - apt_repository:
                repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts.distribution_release }} stable"
                state: present
            - apt:
                name:
                  - docker-ce-cli
                  - docker-compose-plugin
                update_cache: yes
          when: is_debian

        - package:
            name:
              - docker
              - docker-compose
            state: present
          when: is_redhat or is_arch or is_alpine
      when: enable_tools

    # KUBERNETES TOOLS
    - name: kubectl + helm + k9s
      block:
        - name: Install kubectl
          shell: |
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mv kubectl /usr/local/bin/
          args:
            creates: /usr/local/bin/kubectl

        - name: Install helm
          shell: |
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          args:
            creates: /usr/local/bin/helm

        - name: Install k9s
          shell: |
            curl -sS https://webi.sh/k9s | sh
            ~/.local/bin/k9s -> /usr/local/bin/k9s
          args:
            creates: /usr/local/bin/k9s
      when: enable_k8s

    # CLOUD CLI
    - name: AWS + GCP + Azure CLI
      block:
        - name: AWS CLI v2
          shell: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            ./aws/install
            rm -rf awscliv2.zip aws/
          args:
            creates: /usr/local/bin/aws

        - name: Google Cloud CLI
          shell: |
            curl https://sdk.cloud.google.com | bash
            exec -l $SHELL
          args:
            creates: ~/google-cloud-sdk/bin/gcloud
          environment:
            CLOUDSDK_CORE_DISABLE_PROMPTS: 1

        - name: Azure CLI
          shell: |
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          args:
            creates: /usr/bin/az
          when: is_debian or is_redhat

        - name: Azure Arch/Alpine
          package: name=azcli state=present
          when: is_arch or is_alpine
      when: enable_cloud

    # MONITORING
    - name: Monitoring tools
      block:
        - package:
            name:
              - glances
              - nmon
              - sysdig
              - prometheus-node-exporter
            state: present
          when: is_debian or is_redhat or is_arch

        - apk:
            name:
              - glances
              - sysdig
            repositories:
              - http://dl-cdn.alpinelinux.org/alpine/edge/community
            state: present
          when: is_alpine
      when: enable_monitoring

    # INFRA TOOLS
    - name: Infrastructure tools
      package:
        name:
          - ansible
          - terraform
          - packer
          - vagrant
          - consul
          - vault
        state: present
      when: enable_tools

    # HOMELAB EXTRAS (jouw voorkeuren)
    - name: Homelab tools
      block:
        - package:
            name:
              - restic
              - gotify-server
              - postgresql-client
              - mariadb-client
            state: present
          when: is_debian or is_redhat or is_arch

        - apk:
            name:
              - restic
              - postgresql-client
              - mariadb-client
            state: present
          when: is_alpine

    # SHELL IMPROVEMENTS
    - name: Install zsh + oh-my-zsh
      shell: |
        sh -c "$(curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
      args:
        creates: ~/.oh-my-zsh

    - name: Starship prompt
      shell: |
        curl -sS https://starship.rs/install.sh | sh
      args:
        creates: ~/.config/starship.toml

  post_tasks:
    - name: Docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Reload shell
      shell: newgrp docker
      become_user: "{{ ansible_user }}"