---
- name: Complete i3 + LightDM + Nord Workstation (1 script)
  hosts: localhost
  become: true
  vars:
    enable_gui: true
    enable_browser: true  
    enable_docker: true
    enable_vagrant: false
    browser_preference: "falkon"  # falkon | firefox

    nord_colors:
      bg: "#2E3440"
      fg: "#D8DEE9"
      black: "#3B4252"
      red: "#BF616A"
      green: "#A3BE8C"
      yellow: "#EBCB8B"
      blue: "#81A1C1"
      magenta: "#B48EAD"
      cyan: "#88C0D0"
      white: "#ECEFF4"

  tasks:
    - name: Detect OS
      set_fact:
        is_debian: "{{ ansible_facts.os_family == 'Debian' }}"
        is_redhat: "{{ ansible_facts.os_family == 'RedHat' }}"
        is_arch: "{{ ansible_facts.distribution == 'Archlinux' }}"
        is_alpine: "{{ ansible_facts.distribution == 'Alpine' }}"

    - name: Update packages
      block:
        - apt: update_cache=yes cache_valid_time=3600
          when: is_debian
        - dnf: update_cache=yes
          when: is_redhat
        - pacman: update_cache=yes
          when: is_arch
        - apk: update_cache=yes
          when: is_alpine

    # CORE DESKTOP: i3 + LightDM + kitty + dmenu
    - name: Install desktop packages
      block:
        - name: Debian/Ubuntu
          apt:
            name:
              - i3
              - lightdm
              - lightdm-gtk-greeter
              - dmenu
              - kitty
              - feh
              - xserver-xorg
              - dbus-x11
            state: present
          when: is_debian

        - name: RedHat/Fedora  
          dnf:
            name:
              - i3
              - lightdm
              - lightdm-gtk
              - dmenu
              - kitty
              - feh
              - xorg-x11-server-Xorg
              - dbus-x11
            state: present
          when: is_redhat

        - name: Arch
          pacman:
            name:
              - i3-wm
              - lightdm
              - lightdm-gtk-greeter
              - dmenu
              - kitty
              - feh
              - xorg
            state: present
          when: is_arch

        - name: Alpine (community repo)
          apk:
            name:
              - i3wm
              - lightdm
              - lightdm-gtk-greeter
              - dmenu
              - kitty
              - feh
              - dbus
            repositories:
              - http://dl-cdn.alpinelinux.org/alpine/edge/community
            state: present
          when: is_alpine
      when: enable_gui

    # BROWSER
    - name: Install browser
      block:
        - block:
            - apt: name=falkon state=present
              when: is_debian
            - dnf: name=falkon state=present  
              when: is_redhat
            - pacman: name=falkon state=present
              when: is_arch
            - apk:
                name=falkon
                repositories: - http://dl-cdn.alpinelinux.org/alpine/edge/community
              when: is_alpine
          when: browser_preference == "falkon"

        - block:
            - apt: name=firefox-esr state=present
              when: is_debian
            - dnf: name=firefox state=present
              when: is_redhat
            - pacman: name=firefox state=present
              when: is_arch
            - apk: name=firefox state=present
              when: is_alpine
          when: browser_preference == "firefox"
      when: enable_gui and enable_browser

    # DOCKER (official)
    - name: Docker Debian
      block:
        - apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            keyring: /usr/share/keyrings/docker-archive-keyring.gpg
        - apt_repository:
            repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts.distribution_release }} stable"
            state: present
        - apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            update_cache: yes
      when: is_debian and enable_docker

    - name: Docker RedHat/Arch/Alpine  
      package:
        name:
          - docker
          - docker-compose
        state: present
      when: (is_redhat or is_arch or is_alpine) and enable_docker

    # NORD THEME + CONFIGS
    - name: Config dirs
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - ~/.config/i3
        - ~/.config/kitty
      when: enable_gui

    - name: i3 config (Nord)
      copy:
        content: |
          # i3 config - Nord themed
          set $mod Mod4
          
          # Nord colors
          set $bg     #2E3440
          set $fg     #D8DEE9  
          set $black  #3B4252
          set $red    #BF616A
          set $green  #A3BE8C
          set $yellow #EBCB8B
          set $blue   #81A1C1
          set $cyan   #88C0D0

          # bar colors
          bar {
              status_command i3status
              colors {
                  background $bg
                  statusline $fg
                  focused_workspace  $blue $bg $fg
                  active_workspace   $black $bg $white
                  inactive_workspace $black $bg $black
                  urgent_workspace   $red $bg $red
              }
          }

          # Wallpaper
          exec_always --no-startup-id feh --bg-scale ~/Pictures/nord-wallpaper.png

          # Keybindings
          bindsym $mod+Return exec kitty
          bindsym $mod+d exec dmenu_run
          bindsym $mod+Shift+q kill
          bindsym $mod+q kill
          bindsym $mod+Shift+c reload
          bindsym $mod+Shift+r restart
          bindsym $mod+Shift+e exec "i3-nagbar -t warning -m 'Exit i3?' -B 'Yes' 'i3-msg exit'"
          
          # Workspaces
          {% for i in range(1, 10) %}
          bindsym $mod+{{ i }} workspace number {{ i }}
          {% endfor %}
        dest: ~/.config/i3/config

    - name: Kitty config (Nord)
      copy:
        content: |
          background #2E3440
          foreground #D8DEE9
          cursor #D8DEE9
          
          # Kitty nord theme
          color0  #3B4252
          color1  #BF616A
          color2  #A3BE8C
          color3  #EBCB8B
          color4  #81A1C1
          color5  #B48EAD
          color6  #88C0D0
          color7  #ECEFF4
          color8  #4C566A
          color9  #BF616A
          color10 #A3BE8C
          color11 #EBCB8B
          color12 #81A1C1
          color13 #B48EAD
          color14 #8FBCBB
          color15 #ECEFF4
        dest: ~/.config/kitty/kitty.conf

    - name: Nord wallpaper
      get_url:
        url: https://raw.githubusercontent.com/arcticicestudio/nord-wallpapers/master/4K/Nordic%20Landscape.png
        dest: ~/Pictures/nord-wallpaper.png

    # SERVICES
    - name: Enable services
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - lightdm
        - docker
      when: 
        - enable_gui or enable_docker
        - item == 'lightdm' or item == 'docker'

    - name: Docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      when: enable_docker

  handlers:
    - name: Reload i3
      shell: i3-msg reload
      ignore_errors: yes